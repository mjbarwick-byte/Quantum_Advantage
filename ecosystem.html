{source:'workforce',target:'ground_force',type:'compounds'},
{source:'counter_qew',target:'rydar',type:'compounds'},
{source:'counter_qew',target:'qpnt',type:'compounds'},
{source:'iw_gap',target:'counter_qew',type:'produces'},
{source:'qinertial',target:'gps_denied',type:'produces'},
{source:'magnetometry',target:'asw_detection',type:'produces'},
{source:'gravimetry',target:'subterranean',type:'produces'},
{source:'rydar',target:'sigint',type:'produces'}
];

const KF_M={
kf1:['private_capital','startups','academic','darpa_roqs','aukus','allied_foundries','nqi','defense_labs'],
kf2:['qpnt','rydar','gravimetry','qclocks','magnetometry','nvdiamond','qradar','qlidar','qinertial','strategic_platforms','fixed_sites','space_vehicles'],
kf3:['mcf','fyp','bri','state_scaling','china_gov_invest','transparent_oceans','centralized_model','css','bri_dualuse','asw_detection','subterranean','iw_gap','counter_qew'],
kf4:['ruggedization','mfg_supply','cjadc2','workforce','swapc','envnoise','cmos_path','ground_force','gps_denied','sigint']
};

const svg=d3.select('#graph').attr('viewBox',`0 0 ${W} ${H}`);
const defs=svg.append('defs');
const pat=defs.append('pattern').attr('id','grid').attr('width',40).attr('height',40).attr('patternUnits','userSpaceOnUse');
pat.append('circle').attr('cx',20).attr('cy',20).attr('r',.4).attr('fill','rgba(60,80,120,.15)');
svg.append('rect').attr('width',W).attr('height',H).attr('fill','url(#grid)');
['depends','enables','compounds','deploys','produces'].forEach(t=>{
defs.append('marker').attr('id',`arrow-${t}`).attr('viewBox','0 -3 6 6').attr('refX',20).attr('refY',0).attr('markerWidth',4).attr('markerHeight',4).attr('orient','auto').append('path').attr('d','M0,-3L6,0L0,3').attr('fill',EC[t]);
});

const sim=d3.forceSimulation(nodes)
.force('link',d3.forceLink(edges).id(d=>d.id).distance(80).strength(.04))
.force('collision',d3.forceCollide().radius(d=>d.size+16))
.force('bounds',()=>{nodes.forEach(d=>{d.x=Math.max(60,Math.min(W-60,d.x));d.y=Math.max(80,Math.min(H-50,d.y))})})
.alphaDecay(.05).velocityDecay(.65);
sim.on('end',()=>{nodes.forEach(d=>{d.fx=d.x;d.fy=d.y})});

const lG=svg.append('g');
const lE=lG.selectAll('line').data(edges).enter().append('line').attr('class','link')
.attr('stroke',d=>EC[d.type]).attr('stroke-width',d=>d.type==='compounds'?2.2:1.2)
.attr('stroke-dasharray',d=>d.type==='compounds'?'5,3':null)
.attr('marker-end',d=>`url(#arrow-${d.type})`);

const nG=svg.append('g');
const nE=nG.selectAll('g').data(nodes).enter().append('g').attr('class','node')
.call(d3.drag().on('start',dS).on('drag',dD).on('end',dE));

nE.append('circle').attr('class','node-circle').attr('r',d=>d.size)
.attr('fill',d=>{const c=CC[d.category];return d3.color(c).copy({opacity:.12})})
.attr('stroke',d=>AC[d.advantage]).attr('stroke-width',d=>d.advantage==='bounded'?1:2);

nE.append('circle').attr('r',d=>Math.max(3,d.size*.25)).attr('fill',d=>CC[d.category]).attr('pointer-events','none');

nE.each(function(d){const g=d3.select(this);d.label.split('\n').forEach((l,i)=>{g.append('text').attr('class','node-label').attr('dy',d.size+10+i*12).text(l)})});

const tt=d3.select('#tooltip');

nE.on('mouseover',function(ev,d){
  // Show tooltip always
  tt.style('display','block').html(`<div class="tt-title">${d.label.replace(/\n/g,' ')}</div><div class="tt-cat" style="color:${CC[d.category]}">${d.category.replace('_',' ')}</div>${d.desc.substring(0,140)}...`).style('left',(ev.clientX+14)+'px').style('top',(ev.clientY-10)+'px');
  // Only highlight on hover if no node is click-locked
  if(!focusedNode) hC(d);
})
.on('mousemove',function(ev){tt.style('left',(ev.clientX+14)+'px').style('top',(ev.clientY-10)+'px')})
.on('mouseout',function(){
  tt.style('display','none');
  // Only reset on mouseout if no node is click-locked
  if(!focusedNode) rH();
})
.on('click',function(ev,d){
  ev.stopPropagation();
  focusedNode=d;
  sIP(d);
  fN(d);
});

svg.on('click',()=>{focusedNode=null;cP();rH()});

sim.on('tick',()=>{
lE.attr('x1',d=>d.source.x).attr('y1',d=>d.source.y).attr('x2',d=>d.target.x).attr('y2',d=>d.target.y);
nE.attr('transform',d=>`translate(${d.x},${d.y})`);
});

function gCN(d){const c=new Set([d.id]);edges.forEach(e=>{const s=typeof e.source==='object'?e.source.id:e.source,t=typeof e.target==='object'?e.target.id:e.target;if(s===d.id)c.add(t);if(t===d.id)c.add(s)});return c}
function hC(d){const c=gCN(d);nE.classed('dimmed',n=>!c.has(n.id));nE.selectAll('.node-label').classed('highlighted',n=>n.id===d.id);lE.classed('dimmed',e=>{const s=typeof e.source==='object'?e.source.id:e.source,t=typeof e.target==='object'?e.target.id:e.target;return!c.has(s)||!c.has(t)});lE.classed('highlighted',e=>{const s=typeof e.source==='object'?e.source.id:e.source,t=typeof e.target==='object'?e.target.id:e.target;return s===d.id||t===d.id})}
function rH(){nE.classed('dimmed',false);nE.selectAll('.node-label').classed('highlighted',false);lE.classed('dimmed',false).classed('highlighted',false)}
function fN(d){const c=gCN(d);nE.classed('dimmed',n=>!c.has(n.id));lE.classed('dimmed',e=>{const s=typeof e.source==='object'?e.source.id:e.source,t=typeof e.target==='object'?e.target.id:e.target;return!c.has(s)||!c.has(t)});lE.classed('highlighted',e=>{const s=typeof e.source==='object'?e.source.id:e.source,t=typeof e.target==='object'?e.target.id:e.target;return s===d.id||t===d.id})}
function sIP(d){const p=document.getElementById('info-panel'),c=gCN(d),cn=nodes.filter(n=>c.has(n.id)&&n.id!==d.id).map(n=>n.label.replace(/\n/g,' '));p.querySelector('.panel-title').textContent=d.label.replace(/\n/g,' ');p.querySelector('.panel-category').textContent=d.category.replace('_',' ');p.querySelector('.panel-category').style.color=CC[d.category];p.querySelector('.panel-desc').textContent=d.desc;p.querySelector('.panel-connections').innerHTML=`<strong>Connected to:</strong> <span>${cn.join(' · ')}</span>`;p.classList.add('visible')}
function cP(){document.getElementById('info-panel').classList.remove('visible')}
function sA(el){document.querySelectorAll('.ctrl-btn').forEach(b=>b.classList.remove('active'));if(el)el.classList.add('active')}
function resetView(el){focusedNode=null;rH();cP();sA(document.querySelector('.ctrl-btn'))}

function filterCategory(cat,el){focusedNode=null;sA(el);if(cat==='all'){rH();return}const s=new Set();nodes.filter(n=>n.category===cat).forEach(n=>s.add(n.id));edges.forEach(e=>{const si=typeof e.source==='object'?e.source.id:e.source,ti=typeof e.target==='object'?e.target.id:e.target;if(s.has(si))s.add(ti);if(s.has(ti))s.add(si)});nE.classed('dimmed',n=>!s.has(n.id));lE.classed('dimmed',e=>{const si=typeof e.source==='object'?e.source.id:e.source,ti=typeof e.target==='object'?e.target.id:e.target;return!s.has(si)||!s.has(ti)});lE.classed('highlighted',e=>{const si=typeof e.source==='object'?e.source.id:e.source,ti=typeof e.target==='object'?e.target.id:e.target;return s.has(si)&&s.has(ti)})}

function highlightKF(kf,el){focusedNode=null;sA(el);const m=new Set(KF_M[kf]);edges.forEach(e=>{const s=typeof e.source==='object'?e.source.id:e.source,t=typeof e.target==='object'?e.target.id:e.target;if(m.has(s))m.add(t);if(m.has(t))m.add(s)});nE.classed('dimmed',n=>!m.has(n.id));lE.classed('dimmed',e=>{const s=typeof e.source==='object'?e.source.id:e.source,t=typeof e.target==='object'?e.target.id:e.target;return!m.has(s)||!m.has(t)});lE.classed('highlighted',e=>{const s=typeof e.source==='object'?e.source.id:e.source,t=typeof e.target==='object'?e.target.id:e.target;return m.has(s)&&m.has(t)})}

function dS(ev,d){if(!ev.active)sim.alphaTarget(.05).restart();d.fx=d.x;d.fy=d.y}
function dD(ev,d){d.fx=ev.x;d.fy=ev.y}
function dE(ev,d){if(!ev.active)sim.alphaTarget(0);d.fx=ev.x;d.fy=ev.y}

function exportPNG(){
const el=document.getElementById('graph'),cl=el.cloneNode(true);
const all=cl.querySelectorAll('*'),orig=el.querySelectorAll('*');
all.forEach((e,i)=>{if(i<orig.length){const cs=window.getComputedStyle(orig[i]);['fill','stroke','stroke-width','stroke-opacity','stroke-dasharray','font-family','font-size','font-weight','opacity','text-anchor','dominant-baseline'].forEach(p=>{e.style[p]=cs.getPropertyValue(p)})}});
const sd=new XMLSerializer().serializeToString(cl),cv=document.createElement('canvas'),sc=2;
cv.width=W*sc;cv.height=H*sc;const ctx=cv.getContext('2d');ctx.scale(sc,sc);
ctx.fillStyle='#0a0e1a';ctx.fillRect(0,0,W,H);
const img=new Image(),bl=new Blob([sd],{type:'image/svg+xml;charset=utf-8'}),url=URL.createObjectURL(bl);
img.onload=()=>{ctx.drawImage(img,0,0,W,H);ctx.fillStyle='#e8ecf4';ctx.font='bold 24px Georgia,serif';ctx.fillText('Quantum Sensing Ecosystem — US\u2013PRC Competition Through 2035',40,40);ctx.fillStyle='#7a8599';ctx.font='13px sans-serif';ctx.fillText('Team Quantum Advantage \u00b7 USAWC AY26',40,62);cv.toBlob(b=>{const a=document.createElement('a');a.download='quantum_ecosystem_network.png';a.href=URL.createObjectURL(b);a.click();URL.revokeObjectURL(url)},'image/png')};
img.src=url}
</script>
</body>
</html>
