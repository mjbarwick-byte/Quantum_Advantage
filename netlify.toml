# ── Netlify Configuration — Quantum Leap Strategic Intelligence Platform ──

[build]
  publish = "."
  functions = "netlify/functions"

# Route /api/* to Netlify Functions for cleaner URLs
[[redirects]]
  from = "/api/*"
  to   = "/.netlify/functions/:splat"
  status = 200

# Security headers
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
